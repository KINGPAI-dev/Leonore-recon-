
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Pai Leonore OSINT Framework - Elite Recon Tool"
    />
    
    <!-- Link Font agar tampilan premium seperti osint.rocks -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- Script Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <title>LEONORE.ROCKS | Elite OSINT Framework</title>
    
    <style>
      body {
        margin: 0;
        background-color: #000000;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      code {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom Scrollbar biar makin keren */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- DIV ID ROOT: Tempat React menempelkan seluruh dashboard kamu -->
    <div id="root"></div>
    
  </body>
</html>
